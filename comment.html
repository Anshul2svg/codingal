<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Comments Example</title>
</head>
<body>

    <!-- This is a single-line comment. The browser will ignore this. -->
    <h1>Welcome to My Website</h1>

    <p>This paragraph is visible to the user.</p>

    <!--
        This is a multi-line comment.
        You can use this to write longer notes to yourself
        or to temporarily disable a chunk of code while testing.
    -->

    <p>Another visible paragraph here.</p>

</body>
</html>
