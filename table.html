<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table Example</title>
    <!-- Simple styling to make the table visible and clean -->
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 12px;
        }
        th {
            background-color: #f2f2f2;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <h1>Student Report Card</h1>
    <hr>

    <table>
        <!-- Table Header Row -->
        <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Subject</th>
            <th>Grade</th>
        </tr>

        <!-- Table Data Row 1 -->
        <tr>
            <td>STU001</td>
            <td>Alex Johnson</td>
            <td>Mathematics</td>
            <td>A</td>
        </tr>

        <!-- Table Data Row 2 -->
        <tr>
            <td>STU002</td>
            <td>Emily Davis</td>
            <td>Computer Science</td>
            <td>A+</td>
        </tr>

        <!-- Table Data Row 3 -->
        <tr>
            <td>STU003</td>
            <td>Michael Brown</td>
            <td>Physics</td>
            <td>B</td>
        </tr>

        <!-- Table Data Row 4 -->
        <tr>
            <td>STU004</td>
            <td>Sophia Wilson</td>
            <td>Chemistry</td>
            <td>A-</td>
        </tr>
    </table>

</body>
</html>
